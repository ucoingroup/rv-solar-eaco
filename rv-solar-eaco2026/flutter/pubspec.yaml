name: rv_solar_eaco
description: RV Solar EACO - 房车光伏+Web3支付一站式平台
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  equatable: ^2.0.5
  
  # Network
  dio: ^5.3.3
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  
  # Wallet & Blockchain
  solana: ^0.29.0
  bip39: ^1.0.6
  cryptography: ^2.7.0
  web3dart: ^2.7.1
  
  # UI
  flutter_map: ^6.0.1
  latlong2: ^0.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  qr_flutter: ^4.1.0
  fl_chart: ^0.65.0
  
  # Utils
  intl: ^0.18.1
  logger: ^2.0.2+1
  uuid: ^4.2.1
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700